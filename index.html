<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Azumuta · Prompt-driven Dashboards</title>
<link rel="stylesheet" href="colors_and_type.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/light/style.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css">
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: var(--bg-page); }
  @keyframes azpulse { 0% { box-shadow: 0 0 0 0 rgba(255,74,46,0.45); } 70% { box-shadow: 0 0 0 8px rgba(255,74,46,0); } 100% { box-shadow: 0 0 0 0 rgba(255,74,46,0); } }
  @keyframes azspin { to { transform: rotate(360deg); } }
  .az-spin { display: inline-block; animation: azspin 0.8s linear infinite; }
  @keyframes azshimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
  .az-shimmer { background: linear-gradient(90deg, transparent, rgba(255,200,189,0.25), transparent); animation: azshimmer 1.6s infinite; }
  @keyframes wdg-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .wdg-in { animation: wdg-in 240ms cubic-bezier(0.2,0.8,0.2,1) both; }
  .dash-row:hover .pin-btn { opacity: 1 !important; }
  .wdg-card:hover .wdg-tools { opacity: 1 !important; }
  .wdg-tools { opacity: 0; transition: opacity 120ms; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root" style="height:100%"></div>

<!-- Shared primitives (order matters: each file uses exports from prior ones) -->
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="widgets.jsx"></script>
<script type="text/babel" src="ai-panel.jsx"></script>
<script type="text/babel" src="app-shell.jsx"></script>
<script type="text/babel" src="widget-render.jsx"></script>
<script type="text/babel" src="ai-engine.jsx"></script>
<script type="text/babel" src="co-pilot.jsx"></script>
<script type="text/babel" src="prototype-app.jsx"></script>

<script type="text/babel">
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
