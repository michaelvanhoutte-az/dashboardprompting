<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Prompt-driven Dashboards · Layout Directions</title>
<link rel="stylesheet" href="colors_and_type.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/light/style.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css">
<style>
  html, body { margin: 0; height: 100%; background: var(--bg-page); }
  @keyframes azpulse { 0% { box-shadow: 0 0 0 0 rgba(255,74,46,0.45); } 70% { box-shadow: 0 0 0 8px rgba(255,74,46,0); } 100% { box-shadow: 0 0 0 0 rgba(255,74,46,0); } }
  @keyframes azspin { to { transform: rotate(360deg); } }
  .az-spin { display: inline-block; animation: azspin 0.8s linear infinite; }
  @keyframes azcaret { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
  .az-caret { animation: azcaret 1s step-end infinite; color: var(--az-red); font-weight: 400; }
  @keyframes azshimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
  .az-shimmer { background: linear-gradient(90deg, transparent, rgba(255,200,189,0.25), transparent); animation: azshimmer 1.6s infinite; }
  /* The whole app frame */
  .app-frame { display: flex; height: 100%; overflow: hidden; font-family: var(--font-body); background: var(--bg-page); }
  .canvas-area { flex: 1; display: flex; flexDirection: column; min-width: 0; display: flex; flex-direction: column; }
  .canvas-scroll { flex: 1; overflow: hidden; padding: 18px 24px 24px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="widgets.jsx"></script>
<script type="text/babel" src="ai-panel.jsx"></script>
<script type="text/babel" src="dashboard-content.jsx"></script>
<script type="text/babel" src="app-shell.jsx"></script>
<script type="text/babel">
const { useEffect } = React;

const PRESENCE_TONE = { Subtle: 'light', Branded: 'eggplant', Bold: 'dark' };
const STORY = { A: 'done', B: 'clarify', C: 'building' };
const STATE_BY_MOMENT = { Initial: 'initial', Clarifying: 'clarify', Building: 'building', Result: 'done' };

function CanvasBody({ state }) {
  if (state === 'done') return <DashGridProduction cols={4} />;
  if (state === 'building') return <BuildingDashboard />;
  return <EmptyDashboard />;
}
function headerFor(state) {
  if (state === 'done') return { title: 'Production Overview', subtitle: 'Live · auto-refresh 30s' };
  if (state === 'building') return { title: 'Production Overview', subtitle: 'Assistant is adding widgets…' };
  if (state === 'clarify') return { title: 'Untitled dashboard', subtitle: 'Empty · ask the assistant to build' };
  return { title: 'Untitled dashboard', subtitle: 'Connected · describe your first widget' };
}

/* One layout frame; structure varies by variant, AI state + tone by tweaks. */
function Layout({ variant, state, tone }) {
  const h = headerFor(state);
  const panelW = variant === 'C' ? 384 : 360;
  return (
    <div className="app-frame">
      <AppRail />
      {variant !== 'B' && <DashListRail activeId="prod" />}
      <div className="canvas-area">
        {variant === 'B' && <DashTabs activeId={state === 'done' || state === 'building' ? 'prod' : 'new'} />}
        <CanvasHeader title={h.title} subtitle={h.subtitle} showTabs={variant === 'B'} />
        <div className="canvas-scroll" style={state === 'clarify' || state === 'initial' ? { display: 'flex' } : null}>
          <CanvasBody state={state} />
        </div>
      </div>
      <AiPanel state={state} tone={tone} width={panelW} />
    </div>
  );
}

function PanelFrame({ state, tone }) {
  return (
    <div style={{ display: 'flex', height: '100%', background: 'var(--bg-page)' }}>
      <AiPanel state={state} tone={tone} width={384} />
    </div>
  );
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const tone = PRESENCE_TONE[t.presence] || 'dark';
  useEffect(() => { document.documentElement.style.setProperty('--az-red', t.accent); }, [t.accent]);
  const stateFor = (v) => t.moment === 'Story' ? STORY[v] : (STATE_BY_MOMENT[t.moment] || 'done');
  return (
    <>
    <DesignCanvas>
      <DCSection id="layouts" title="Layout directions" subtitle="Same builder, three ways to arrange the dashboard area + docked AI panel. Use Tweaks to reshape the assistant's presence and the moment shown.">
        <DCArtboard id="layout-a" label="A · Three-pane — persistent list rail + canvas" width={1380} height={880}>
          <Layout variant="A" state={stateFor('A')} tone={tone} />
        </DCArtboard>
        <DCArtboard id="layout-b" label="B · Tabbed canvas — dashboards as tabs, wider canvas" width={1380} height={880}>
          <Layout variant="B" state={stateFor('B')} tone={tone} />
        </DCArtboard>
        <DCArtboard id="layout-c" label="C · AI co-pilot — list rail + prominent assistant" width={1380} height={880}>
          <Layout variant="C" state={stateFor('C')} tone={tone} />
        </DCArtboard>
      </DCSection>

      <DCSection id="flow" title="The AI flow · step by step" subtitle="How the assistant shows its work — from greeting, to clarifying, to live progress, to result summary.">
        <DCArtboard id="flow-1" label="1 · Initial — connected, inviting the first prompt" width={384} height={720}>
          <PanelFrame state="initial" tone={tone} />
        </DCArtboard>
        <DCArtboard id="flow-2" label="2 · Clarify — asks a question with quick-pick chips" width={384} height={720}>
          <PanelFrame state="clarify" tone={tone} />
        </DCArtboard>
        <DCArtboard id="flow-3" label="3 · Building — live progress steps update in place" width={384} height={720}>
          <PanelFrame state="building" tone={tone} />
        </DCArtboard>
        <DCArtboard id="flow-4" label="4 · Result — steps collapse to a summary + widget recap" width={384} height={720}>
          <PanelFrame state="done" tone={tone} />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>

    <TweaksPanel>
      <TweakSection label="Assistant presence"><div style={{ font: '500 11px/1.4 var(--font-body)', color: 'var(--fg-4)', padding: '0 2px 6px' }}>How much the AI co-pilot dominates the screen</div></TweakSection>
      <TweakRadio label="Presence" value={t.presence} options={['Subtle', 'Branded', 'Bold']} onChange={(v) => setTweak('presence', v)} />
      <TweakSection label="What's on screen"><div style={{ font: '500 11px/1.4 var(--font-body)', color: 'var(--fg-4)', padding: '0 2px 6px' }}>Drive every layout to the same moment in the flow</div></TweakSection>
      <TweakSelect label="Flow moment" value={t.moment} options={['Story', 'Initial', 'Clarifying', 'Building', 'Result']} onChange={(v) => setTweak('moment', v)} />
      <TweakSection label="Brand" />
      <TweakColor label="Accent" value={t.accent} options={['#FF4A2E', '#B5371E', '#1726EE', '#2FB67C']} onChange={(v) => setTweak('accent', v)} />
    </TweaksPanel>
    </>
  );
}
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "presence": "Subtle",
  "moment": "Story",
  "accent": "#FF4A2E"
}/*EDITMODE-END*/;
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
